name: Build App

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-react:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Create ZIP archive
        run: |
          zip -r linux.zip web main.py requirements.txt

      - name: Upload to Release
        uses: xresloader/upload-to-github-release@v1
        with:
          file: linux.zip
          overwrite: true
          update_latest_release: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: web
          path: web

  build-windows:
    runs-on: windows-latest
    needs: build-react
    steps:
    - name: Checkout the repo
      uses: actions/checkout@v6

    - name: Download artifact from Linux build
      uses: actions/download-artifact@v8
      with:
        path: web

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build
      run: pyinstaller --noconfirm --onefile --noconsole --name "Discord Presence" --icon="github/icon.ico" --version-file="github/ver" --copy-metadata discord-rpc --add-data="web\\;.\\web" main.py
    
    - name: Upload to Release
      uses: xresloader/upload-to-github-release@v1
      with:
        file: "dist/Discord Presence.exe"
        overwrite: true
        update_latest_release: true
